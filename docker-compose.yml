services:
  db:
    image: mysql:8.0
    container_name: firstwork_db
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: firstwork
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mysql_data:
